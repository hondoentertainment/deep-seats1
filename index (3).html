            useEffect(() => {
                if (editGame) {
                    setFormData(editGame);
                }
            }, [editGame]);

            const handleSubmit = async () => {
                if (!formData.homeTeam || !formData.awayTeam) {
                    alert('Please select both teams');
                    return;
                }
                
                const gameData = {
                    ...formData,
                    id: editGame?.id || Date.now().toString(),
                    createdAt: editGame?.createdAt || new Date().toISOString(),
                };

                // If sharing is enabled and no shared ID exists, create one
                if (formData.isShared && !formData.sharedId && hasStorage) {
                    const sharedId = generateGameId();
                    gameData.sharedId = sharedId;
                    
                    // Save to shared storage
                    const sharedGameData = {
                        ...gameData,
                        comments: [],
                        likes: 0,
                        views: 0,
                    };
                    await setSharedData(sharedId, sharedGameData);
                }

                onSave(gameData);
                onClose();
            };

            if (!isOpen) return null;

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">
                                {editGame ? 'Edit Game' : 'Log New Game'}
                            </h2>
                        </div>
                        <div className="modal-content">
                            <div className="form-group">
                                <label className="form-label">Home Team</label>
                                <select
                                    className="m3-text-field"
                                    value={formData.homeTeam}
                                    onChange={e => setFormData({...formData, homeTeam: e.target.value})}
                                >
                                    <option value="">Select Team</option>
                                    {ALL_TEAMS.map(team => (
                                        <option key={team.id} value={team.id}>
                                            {team.logo} {team.name}
                                        </option>
                                    ))}
                                </select>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Away Team</label>
                                <select
                                    className="m3-text-field"
                                    value={formData.awayTeam}
                                    onChange={e => setFormData({...formData, awayTeam: e.target.value})}
                                >
                                    <option value="">Select Team</option>
                                    {ALL_TEAMS.map(team => (
                                        <option key={team.id} value={team.id}>
                                            {team.logo} {team.name}
                                        </option>
                                    ))}
                                </select>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label className="form-label">Home Score</label>
                                    <input
                                        type="number"
                                        className="m3-text-field"
                                        value={formData.homeScore}
                                        onChange={e => setFormData({...formData, homeScore: e.target.value})}
                                    />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Away Score</label>
                                    <input
                                        type="number"
                                        className="m3-text-field"
                                        value={formData.awayScore}
                                        onChange={e => setFormData({...formData, awayScore: e.target.value})}
                                    />
                                </div>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Date</label>
                                <input
                                    type="date"
                                    className="m3-text-field"
                                    value={formData.date}
                                    onChange={e => setFormData({...formData, date: e.target.value})}
                                />
                            </div>

                            <div className="form-group">
                                <label className="form-label">Venue</label>
                                <input
                                    type="text"
                                    className="m3-text-field"
                                    value={formData.venue}
                                    onChange={e => setFormData({...formData, venue: e.target.value})}
                                    placeholder="e.g., Madison Square Garden"
                                />
                            </div>

                            <div className="form-group">
                                <label className="form-label">Seat Location</label>
                                <input
                                    type="text"
                                    className="m3-text-field"
                                    value={formData.seatLocation}
                                    onChange={e => setFormData({...formData, seatLocation: e.target.value})}
                                    placeholder="e.g., Section 101, Row 5"
                                />
                            </div>

                            <div className="form-group">
                                <label className="form-label">Viewing Format</label>
                                <div style={{ display: 'flex', gap: '8px' }}>
                                    {['Live', 'TV', 'Streaming'].map(format => (
                                        <button
                                            key={format}
                                            className={`m3-chip ${formData.viewingFormat === format ? 'selected' : ''}`}
                                            onClick={() => setFormData({...formData, viewingFormat: format})}
                                        >
                                            {format}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Personal Rating: {formData.personalRating}/10</label>
                                <input
                                    type="range"
                                    min="1"
                                    max="10"
                                    value={formData.personalRating}
                                    onChange={e => setFormData({...formData, personalRating: parseInt(e.target.value)})}
                                    style={{ width: '100%' }}
                                />
                            </div>

                            <div className="form-group">
                                <label className="form-label">Notes</label>
                                <textarea
                                    className="m3-text-field"
                                    rows="3"
                                    value={formData.notes}
                                    onChange={e => setFormData({...formData, notes: e.target.value})}
                                    placeholder="Add your thoughts about the game..."
                                />
                            </div>

                            {hasStorage && (
                                <div className="form-group">
                                    <label style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer' }}>
                                        <input
                                            type="checkbox"
                                            checked={formData.isShared}
                                            onChange={e => setFormData({...formData, isShared: e.target.checked})}
                                            style={{ width: 'auto' }}
                                        />
                                        <span className="form-label" style={{ marginBottom: 0 }}>
                                            Share this game (visible to all users)
                                        </span>
                                    </label>
                                    {formData.isShared && (
                                        <p style={{ fontSize: 'var(--md-sys-typescale-body-small)', color: 'var(--md-sys-color-on-surface-variant)', marginTop: 'var(--spacing-xs)' }}>
                                            Other users will be able to view and comment on this game
                                        </p>
                                    )}
                                </div>
                            )}
                        </div>
                        <div className="modal-actions">
                            <button className="m3-button m3-button-text" onClick={onClose}>
                                Cancel
                            </button>
                            <button className="m3-button m3-button-filled" onClick={handleSubmit}>
                                {editGame ? 'Update' : 'Save'} Game
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function Dashboard({ games }) {
            const totalGames = games.length;
            const totalVenues = new Set(games.map(g => g.venue).filter(Boolean)).size;
            const averageRating = games.length > 0 
                ? (games.reduce((sum, g) => sum + (g.personalRating || 0), 0) / games.length).toFixed(1)
                : 0;
            
            const teamCounts = {};
            games.forEach(game => {
                teamCounts[game.homeTeam] = (teamCounts[game.homeTeam] || 0) + 1;
                teamCounts[game.awayTeam] = (teamCounts[game.awayTeam] || 0) + 1;
            });
            const mostWatchedTeamId = Object.keys(teamCounts).sort((a, b) => teamCounts[b] - teamCounts[a])[0];
            const mostWatchedTeam = ALL_TEAMS.find(t => t.id === mostWatchedTeamId);

            const recentGames = games.slice(0, 3);

            return (
                <div>
                    <div className="dashboard-header">
                        <h1 className="dashboard-title">Deep Seats</h1>
                        <p className="dashboard-subtitle">Your personal sports journey</p>
                    </div>

                    <div className="stats-grid">
                        <div className="m3-card m3-card-elevated stat-card">
                            <div className="stat-label">Total Games</div>
                            <div className="stat-value">{totalGames}</div>
                        </div>
                        <div className="m3-card m3-card-elevated stat-card">
                            <div className="stat-label">Venues Visited</div>
                            <div className="stat-value">{totalVenues}</div>
                        </div>
                        <div className="m3-card m3-card-elevated stat-card">
                            <div className="stat-label">Average Rating</div>
                            <div className="stat-value">{averageRating}</div>
                        </div>
                        <div className="m3-card m3-card-elevated stat-card">
                            <div className="stat-label">Favorite Team</div>
                            <div className="stat-value" style={{ fontSize: '32px' }}>
                                {mostWatchedTeam ? `${mostWatchedTeam.logo} ${mostWatchedTeam.name.split(' ').slice(-1)[0]}` : '—'}
                            </div>
                        </div>
                    </div>

                    <Calendar games={games} />

                    {recentGames.length > 0 && (
                        <div style={{ marginTop: 'var(--spacing-2xl)' }}>
                            <h2 style={{ fontSize: 'var(--md-sys-typescale-headline-medium)', fontWeight: 700, marginBottom: 'var(--spacing-lg)' }}>
                                Recent Games
                            </h2>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--spacing-lg)' }}>
                                {recentGames.map((game, index) => {
                                    const homeTeam = ALL_TEAMS.find(t => t.id === game.homeTeam);
                                    const awayTeam = ALL_TEAMS.find(t => t.id === game.awayTeam);
                                    return (
                                        <div key={game.id} className="m3-card game-card" style={{ animationDelay: `${index * 0.1}s` }}>
                                            <div className="game-header">
                                                <div className="game-teams">
                                                    <div className="team-matchup">
                                                        {homeTeam?.logo} {homeTeam?.name} vs {awayTeam?.logo} {awayTeam?.name}
                                                    </div>
                                                    <div className="game-meta">
                                                        <span>📍 {game.venue || 'Venue not specified'}</span>
                                                        <span>📅 {new Date(game.date).toLocaleDateString()}</span>
                                                        <span>⭐ {game.personalRating}/10</span>
                                                    </div>
                                                </div>
                                                {game.homeScore && game.awayScore && (
                                                    <div className="game-score">
                                                        {game.homeScore} - {game.awayScore}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {games.length === 0 && (
                        <div className="empty-state">
                            <div className="empty-state-icon">🎟️</div>
                            <h3 className="empty-state-title">No games logged yet</h3>
                            <p className="empty-state-subtitle">Start your sports journey by logging your first game</p>
                        </div>
                    )}
                </div>
            );
        }

        function Calendar({ games }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null);
            const [showEventsModal, setShowEventsModal] = useState(false);
            const [selectedTeams, setSelectedTeams] = useState([]);
            const [scheduleMode, setScheduleMode] = useState('none'); // 'none', 'my-teams', 'selected-teams', 'all-teams'

            // Get user's teams (teams they've attended games for)
            const getUserTeams = () => {
                const teamIds = new Set();
                games.forEach(game => {
                    if (game.homeTeam) teamIds.add(game.homeTeam);
                    if (game.awayTeam) teamIds.add(game.awayTeam);
                });
                return ALL_TEAMS.filter(t => teamIds.has(t.id));
            };

            const userTeams = getUserTeams();

            // Generate realistic upcoming games for selected teams
            const generateTeamSchedule = (teams) => {
                const schedule = [];
                const today = new Date();
                
                teams.forEach(team => {
                    // Generate 8-10 games per team over next 3 months
                    const numGames = 8 + Math.floor(Math.random() * 3);
                    
                    for (let i = 0; i < numGames; i++) {
                        // Random date within next 90 days
                        const daysAhead = Math.floor(Math.random() * 90) + 1;
                        const gameDate = new Date(today);
                        gameDate.setDate(today.getDate() + daysAhead);
                        
                        // Random opponent from same league
                        const opponents = ALL_TEAMS.filter(t => 
                            t.league === team.league && t.id !== team.id
                        );
                        const opponent = opponents[Math.floor(Math.random() * opponents.length)];
                        
                        // Random home/away
                        const isHome = Math.random() > 0.5;
                        
                        schedule.push({
                            id: `schedule-${team.id}-${i}`,
                            homeTeam: isHome ? team.id : opponent.id,
                            awayTeam: isHome ? opponent.id : team.id,
                            date: gameDate.toISOString().split('T')[0],
                            time: team.league === 'NBA' ? '7:00 PM' :
                                  team.league === 'MLB' ? '1:00 PM' :
                                  '1:00 PM',
                            venue: isHome ? VENUES.find(v => v.teams.includes(team.name))?.name : 
                                           VENUES.find(v => v.teams.includes(opponent.name))?.name,
                            league: team.league,
                            isScheduled: true
                        });
                    }
                });
                
                return schedule;
            };

            // Get scheduled games based on mode
            const getScheduledGames = () => {
                if (scheduleMode === 'none') return [];
                if (scheduleMode === 'my-teams') return generateTeamSchedule(userTeams);
                if (scheduleMode === 'selected-teams') return generateTeamSchedule(selectedTeams);
                if (scheduleMode === 'all-teams') return generateTeamSchedule(ALL_TEAMS);
                return [];
            };

            const scheduledGames = getScheduledGames();

            // Get all games for a specific date
            const getGamesForDate = (date) => {
                const dateStr = date.toISOString().split('T')[0];
                return games.filter(game => game.date === dateStr);
            };

            // Get scheduled games for date
            const getScheduledGamesForDate = (date) => {
                const dateStr = date.toISOString().split('T')[0];
                return scheduledGames.filter(game => game.date === dateStr);
            };

            // Get all upcoming games (from UPCOMING_GAMES)
            const getUpcomingGamesForDate = (date) => {
                const dateStr = date.toISOString().split('T')[0];
                return UPCOMING_GAMES.filter(game => game.date === dateStr);
            };

            const handleTeamToggle = (teamId) => {
                setSelectedTeams(prev => {
                    if (prev.find(t => t.id === teamId)) {
                        return prev.filter(t => t.id !== teamId);
                    } else {
                        const team = ALL_TEAMS.find(t => t.id === teamId);
                        return [...prev, team];
                    }
                });
            };

            // Navigate months
            const previousMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            };

            const nextMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            };

            const today = () => {
                setCurrentDate(new Date());
            };

            // Generate calendar days
            const generateCalendarDays = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startingDayOfWeek = firstDay.getDay();
                
                const days = [];
                
                // Previous month days
                const prevMonthLastDay = new Date(year, month, 0).getDate();
                for (let i = startingDayOfWeek - 1; i >= 0; i--) {
                    const date = new Date(year, month - 1, prevMonthLastDay - i);
                    days.push({ date, isCurrentMonth: false });
                }
                
                // Current month days
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    days.push({ date, isCurrentMonth: true });
                }
                
                // Next month days
                const remainingDays = 42 - days.length; // 6 rows * 7 days
                for (let day = 1; day <= remainingDays; day++) {
                    const date = new Date(year, month + 1, day);
                    days.push({ date, isCurrentMonth: false });
                }
                
                return days;
            };

            const handleDayClick = (date) => {
                const pastGames = getGamesForDate(date);
                const upcomingGames = getUpcomingGamesForDate(date);
                const scheduled = getScheduledGamesForDate(date);
                
                if (pastGames.length > 0 || upcomingGames.length > 0 || scheduled.length > 0) {
                    setSelectedDate(date);
                    setShowEventsModal(true);
                }
            };

            const calendarDays = generateCalendarDays();
            const monthYear = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const todayDate = new Date();
            todayDate.setHours(0, 0, 0, 0);

            return (
                <div className="calendar-container">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 'var(--spacing-lg)' }}>
                        <h2 style={{ fontSize: 'var(--md-sys-typescale-headline-medium)', fontWeight: 700, margin: 0 }}>
                            Sports Calendar
                        </h2>
                    </div>

                    {/* Schedule Mode Selector */}
                    <div className="m3-card m3-card-elevated" style={{ padding: 'var(--spacing-lg)', marginBottom: 'var(--spacing-lg)' }}>
                        <div style={{ marginBottom: 'var(--spacing-md)' }}>
                            <strong style={{ fontSize: 'var(--md-sys-typescale-title-small)' }}>📅 Show Schedules:</strong>
                        </div>
                        <div className="timeline-filters">
                            <button
                                className={`m3-chip ${scheduleMode === 'none' ? 'selected' : ''}`}
                                onClick={() => setScheduleMode('none')}
                            >
                                My Games Only
                            </button>
                            {userTeams.length > 0 && (
                                <button
                                    className={`m3-chip ${scheduleMode === 'my-teams' ? 'selected' : ''}`}
                                    onClick={() => setScheduleMode('my-teams')}
                                >
                                    My Teams ({userTeams.length})
                                </button>
                            )}
                            <button
                                className={`m3-chip ${scheduleMode === 'selected-teams' ? 'selected' : ''}`}
                                onClick={() => setScheduleMode('selected-teams')}
                            >
                                Selected Teams ({selectedTeams.length})
                            </button>
                            <button
                                className={`m3-chip ${scheduleMode === 'all-teams' ? 'selected' : ''}`}
                                onClick={() => setScheduleMode('all-teams')}
                            >
                                All Teams
                            </button>
                        </div>

                        {/* Team Selector for selected-teams mode */}
                        {scheduleMode === 'selected-teams' && (
                            <div style={{ marginTop: 'var(--spacing-md)' }}>
                                <div style={{ marginBottom: 'var(--spacing-sm)', fontSize: 'var(--md-sys-typescale-body-small)', color: 'var(--md-sys-color-on-surface-variant)' }}>
                                    Select teams to show their schedules:
                                </div>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 'var(--spacing-sm)' }}>
                                    {ALL_TEAMS.slice(0, 20).map(team => (
                                        <button
                                            key={team.id}
                                            className={`m3-chip ${selectedTeams.find(t => t.id === team.id) ? 'selected' : ''}`}
                                            onClick={() => handleTeamToggle(team.id)}
                                        >
                                            {team.logo} {team.name.split(' ').slice(-1)[0]}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {scheduleMode !== 'none' && (
                            <div style={{ marginTop: 'var(--spacing-md)', padding: 'var(--spacing-sm)', background: 'var(--md-sys-color-primary-container)', borderRadius: 'var(--shape-corner-small)', fontSize: 'var(--md-sys-typescale-body-small)' }}>
                                ℹ️ Showing {scheduledGames.length} scheduled games in calendar
                            </div>
                        )}
                    </div>
                    const date = new Date(year, month - 1, prevMonthLastDay - i);
                    days.push({ date, isCurrentMonth: false });
                }
                
                // Current month days
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    days.push({ date, isCurrentMonth: true });
                }
                
                // Next month days
                const remainingDays = 42 - days.length; // 6 rows * 7 days
                for (let day = 1; day <= remainingDays; day++) {
                    const date = new Date(year, month + 1, day);
                    days.push({ date, isCurrentMonth: false });
                }
                
                return days;
            };

            const handleDayClick = (date) => {
                const pastGames = getGamesForDate(date);
                const upcomingGames = getUpcomingGamesForDate(date);
                
                if (pastGames.length > 0 || upcomingGames.length > 0) {
                    setSelectedDate(date);
                    setShowEventsModal(true);
                }
            };

            const calendarDays = generateCalendarDays();
            const monthYear = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const todayDate = new Date();
            todayDate.setHours(0, 0, 0, 0);

            return (
                <div className="calendar-container">
                    <h2 style={{ fontSize: 'var(--md-sys-typescale-headline-medium)', fontWeight: 700, marginBottom: 'var(--spacing-lg)' }}>
                        Your Sports Calendar
                    </h2>

                    <div className="m3-card m3-card-elevated">
                        <div className="calendar-header">
                            <div className="calendar-nav">
                                <button className="calendar-nav-btn" onClick={previousMonth} title="Previous month">
                                    ‹
                                </button>
                                <div className="calendar-month-year">{monthYear}</div>
                                <button className="calendar-nav-btn" onClick={nextMonth} title="Next month">
                                    ›
                                </button>
                            </div>
                            <button className="m3-button m3-button-outlined" onClick={today}>
                                Today
                            </button>
                        </div>

                        <div className="calendar-grid">
                            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                                <div key={day} className="calendar-day-header">{day}</div>
                            ))}
                            
                            {calendarDays.map((day, index) => {
                                const pastGames = getGamesForDate(day.date);
                                const upcomingGames = getUpcomingGamesForDate(day.date);
                                const scheduled = getScheduledGamesForDate(day.date);
                                const totalEvents = pastGames.length + upcomingGames.length + scheduled.length;
                                const isToday = day.date.toDateString() === todayDate.toDateString();
                                
                                let className = 'calendar-day';
                                if (!day.isCurrentMonth) className += ' other-month';
                                if (isToday) className += ' today';
                                if (totalEvents > 0) className += ' has-events';

                                return (
                                    <div
                                        key={index}
                                        className={className}
                                        onClick={() => handleDayClick(day.date)}
                                        style={{ animationDelay: `${index * 0.01}s` }}
                                    >
                                        <div className="calendar-day-number">
                                            {day.date.getDate()}
                                        </div>
                                        {totalEvents > 0 && (
                                            <div className="calendar-day-events">
                                                {pastGames.map((game, i) => {
                                                    const team = ALL_TEAMS.find(t => t.id === game.homeTeam);
                                                    return (
                                                        <div key={i} className="calendar-event-indicator">
                                                            {team?.logo}
                                                        </div>
                                                    );
                                                })}
                                                {scheduled.map((game, i) => {
                                                    const team = ALL_TEAMS.find(t => t.id === game.homeTeam);
                                                    return (
                                                        <div key={`scheduled-${i}`} className="calendar-event-indicator" style={{ opacity: 0.5, border: '1px dashed var(--md-sys-color-outline)' }}>
                                                            {team?.logo}
                                                        </div>
                                                    );
                                                })}
                                                {upcomingGames.map((game, i) => {
                                                    const team = ALL_TEAMS.find(t => t.id === game.homeTeam);
                                                    return (
                                                        <div key={`upcoming-${i}`} className="calendar-event-indicator" style={{ opacity: 0.6 }}>
                                                            {team?.logo}
                                                        </div>
                                                    );
                                                })}
                                                {totalEvents > 2 && (
                                                    <div className="calendar-event-count">+{totalEvents - 2}</div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        <div className="calendar-legend">
                            <div className="calendar-legend-item">
                                <div className="calendar-legend-box" style={{ background: 'var(--md-sys-color-primary-container)', border: '2px solid var(--md-sys-color-primary)' }}></div>
                                <span>Today</span>
                            </div>
                            <div className="calendar-legend-item">
                                <div className="calendar-legend-box" style={{ background: 'var(--md-sys-color-tertiary-container)' }}></div>
                                <span>Has Events</span>
                            </div>
                            <div className="calendar-legend-item">
                                <span>🔵 Past Game</span>
                            </div>
                            <div className="calendar-legend-item">
                                <span style={{ opacity: 0.6 }}>🔵 Upcoming Game</span>
                            </div>
                        </div>
                    </div>

        function TrophyRoom({ games }) {
            const [showcaseTrophies, setShowcaseTrophies] = useState(['first-game', 'dedicated-fan', 'superfan']);

            const calculateTrophyProgress = (trophy) => {
                switch (trophy.id) {
                    case 'first-game':
                    case 'dedicated-fan':
                    case 'season-ticket':
                    case 'superfan':
                    case 'legend':
                        return { current: games.length, required: trophy.requirement };
                    
                    case 'multi-sport': {
                        const leagues = new Set();
                        games.forEach(game => {
                            const team = ALL_TEAMS.find(t => t.id === game.homeTeam);
                            if (team) leagues.add(team.league);
                        });
                        return { current: leagues.size, required: trophy.requirement };
                    }
                    
                    case 'team-loyalist': {
                        const teamCounts = {};
                        games.forEach(game => {
                            teamCounts[game.homeTeam] = (teamCounts[game.homeTeam] || 0) + 1;
                            teamCounts[game.awayTeam] = (teamCounts[game.awayTeam] || 0) + 1;
                        });
                        const maxCount = Math.max(0, ...Object.values(teamCounts));
                        return { current: maxCount, required: trophy.requirement };
                    }
                    
                    case 'venue-explorer': {
                        const venues = new Set(games.map(g => g.venue).filter(Boolean));
                        return { current: venues.size, required: trophy.requirement };
                    }
                    
                    default:
                        return { current: 0, required: trophy.requirement };
                }
            };

            const trophiesWithProgress = TROPHIES.map(trophy => {
                const progress = calculateTrophyProgress(trophy);
                const unlocked = progress.current >= progress.required;
                return { ...trophy, ...progress, unlocked };
            });

            const unlockedCount = trophiesWithProgress.filter(t => t.unlocked).length;

            return (
                <div>
                    <div className="dashboard-header">
                        <h1 className="dashboard-title">Trophy Room</h1>
                        <p className="dashboard-subtitle">{unlockedCount} of {TROPHIES.length} trophies unlocked</p>
                    </div>

                    <div className="trophy-showcase">
                        <h3 className="showcase-title">⭐ Showcase</h3>
                        <div className="showcase-carousel">
                            {showcaseTrophies.map(trophyId => {
                                const trophy = trophiesWithProgress.find(t => t.id === trophyId);
                                return trophy ? (
                                    <div key={trophy.id} className="showcase-trophy">
                                        <span className="trophy-icon">{trophy.icon}</span>
                                        <div className="trophy-name">{trophy.name}</div>
                                        <div className="trophy-progress">
                                            {trophy.unlocked ? 'Unlocked!' : `${trophy.current}/${trophy.required}`}
                                        </div>
                                    </div>
                                ) : null;
                            })}
                        </div>
                    </div>

                    <div className="trophy-grid">
                        {trophiesWithProgress.map((trophy, index) => (
                            <div
                                key={trophy.id}
                                className={`m3-card m3-card-elevated trophy-card ${trophy.unlocked ? 'unlocked' : 'locked'}`}
                                style={{ animationDelay: `${index * 0.05}s` }}
                            >
                                <span className="trophy-icon">{trophy.icon}</span>
                                <div className="trophy-name">{trophy.name}</div>
                                <div className="trophy-progress">
                                    {trophy.unlocked ? '✓ Unlocked' : `${trophy.current}/${trophy.required}`}
                                </div>
                                <p style={{ fontSize: 'var(--md-sys-typescale-body-small)', color: 'var(--md-sys-color-on-surface-variant)', marginTop: 'var(--spacing-xs)' }}>
                                    {trophy.description}
                                </p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function TeamTracker({ games }) {
            const [filterLeague, setFilterLeague] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [viewMode, setViewMode] = useState('all'); // 'all' or 'visited'

            // Calculate team stats
            const teamStats = {};
            games.forEach(game => {
                [game.homeTeam, game.awayTeam].forEach(teamId => {
                    if (!teamId) return;
                    if (!teamStats[teamId]) {
                        teamStats[teamId] = { games: 0, wins: 0, losses: 0 };
                    }
                    teamStats[teamId].games++;
                    
                    if (game.homeScore && game.awayScore) {
                        const isHome = teamId === game.homeTeam;
                        const won = isHome 
                            ? parseInt(game.homeScore) > parseInt(game.awayScore)
                            : parseInt(game.awayScore) > parseInt(game.homeScore);
                        if (won) {
                            teamStats[teamId].wins++;
                        } else {
                            teamStats[teamId].losses++;
                        }
                    }
                });
            });

            // Get teams to display
            let teamsToShow = viewMode === 'visited' 
                ? ALL_TEAMS.filter(team => teamStats[team.id])
                : ALL_TEAMS;

            // Filter teams
            teamsToShow = teamsToShow.filter(team => {
                if (filterLeague !== 'all' && team.league !== filterLeague) return false;
                if (searchQuery && !team.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                return true;
            });

            // Sort by games attended (visited first)
            teamsToShow.sort((a, b) => {
                const aGames = teamStats[a.id]?.games || 0;
                const bGames = teamStats[b.id]?.games || 0;
                return bGames - aGames;
            });

            return (

        function VenueExplorer({ games }) {
            const [searchQuery, setSearchQuery] = useState('');
            const [filterLeague, setFilterLeague] = useState('all');
            const mapRef = useRef(null);
            const leafletMapRef = useRef(null);
            const markersRef = useRef([]);

            // Get visited venues from games
            const visitedVenues = new Set(games.map(g => g.venue).filter(Boolean));

            // Calculate stats
            const stats = {
                visited: visitedVenues.size,
                nba: VENUES.filter(v => v.league === 'NBA' && visitedVenues.has(v.name)).length,
                mlb: VENUES.filter(v => v.league === 'MLB' && visitedVenues.has(v.name)).length,
                nfl: VENUES.filter(v => v.league === 'NFL' && visitedVenues.has(v.name)).length,
            };

            // Filter venues
            const filteredVenues = VENUES.filter(venue => {
                const matchesLeague = filterLeague === 'all' || venue.league === filterLeague;
                const matchesSearch = !searchQuery || 
                    venue.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    venue.city.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    venue.state.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesLeague && matchesSearch;
            });

            // Initialize map
            useEffect(() => {
                if (!mapRef.current || leafletMapRef.current) return;

                // Create map centered on USA
                const map = L.map(mapRef.current, {
                    center: [39.8283, -98.5795],
                    zoom: 4,
                    scrollWheelZoom: true,
                    zoomControl: true
                });

                // Add OpenStreetMap tiles
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 18,
                }).addTo(map);

                leafletMapRef.current = map;

                return () => {
                    if (leafletMapRef.current) {
                        leafletMapRef.current.remove();
                        leafletMapRef.current = null;
                    }
                };
            }, []);

            // Update markers when venues change
            useEffect(() => {
                if (!leafletMapRef.current) return;

                // Clear existing markers
                markersRef.current.forEach(marker => marker.remove());
                markersRef.current = [];

                // Add markers for filtered venues
                filteredVenues.forEach(venue => {
                    const isVisited = visitedVenues.has(venue.name);
                    const gamesAtVenue = games.filter(g => g.venue === venue.name);

                    // Create custom icon
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="custom-marker ${venue.league.toLowerCase()} ${isVisited ? 'visited' : ''}">
                            ${venue.league === 'NBA' ? '🏀' : venue.league === 'MLB' ? '⚾' : '🏈'}
                        </div>`,
                        iconSize: [40, 40],
                        iconAnchor: [20, 20],
                        popupAnchor: [0, -20]
                    });

                    // Create marker
                    const marker = L.marker([venue.lat, venue.lng], { icon })
                        .addTo(leafletMapRef.current);

                    // Create popup content
                    const popupContent = `
                        <div class="venue-popup">
                            <div class="venue-popup-title">${venue.name}</div>
                            <div class="venue-popup-location">📍 ${venue.city}, ${venue.state}</div>
                            <div class="venue-popup-badge ${venue.league.toLowerCase()}">${venue.league}</div>
                            ${isVisited ? `<div class="venue-popup-visited">✓ Visited - ${gamesAtVenue.length} game${gamesAtVenue.length !== 1 ? 's' : ''}</div>` : ''}
                            <div style="margin-top: 8px; font-size: 12px; color: #666;">
                                👥 ${venue.capacity.toLocaleString()} capacity
                            </div>
                        </div>
                    `;

                    marker.bindPopup(popupContent);

                    // Add click handler to scroll to venue in list
                    marker.on('click', () => {
                        scrollToVenue(venue.id);
                    });

                    markersRef.current.push(marker);
                });

                // Fit bounds if we have markers
                if (markersRef.current.length > 0) {
                    const group = L.featureGroup(markersRef.current);
                    leafletMapRef.current.fitBounds(group.getBounds().pad(0.1));
                }
            }, [filteredVenues, visitedVenues, games]);

            const scrollToVenue = (venueId) => {
                const element = document.getElementById(`venue-${venueId}`);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    element.style.transform = 'scale(1.02)';
                    setTimeout(() => {
                        element.style.transform = 'scale(1)';
                    }, 300);
                }
            };

            return (
                <div>
                    <div className="dashboard-header">
                        <h1 className="dashboard-title">Venue Explorer</h1>
                        <p className="dashboard-subtitle">Explore stadiums and arenas across the leagues</p>
                    </div>

                    <div className="venue-stats-summary">
                        <div className="m3-card m3-card-elevated venue-stat-summary">
                            <div className="venue-stat-number">{stats.visited}</div>
                            <div className="venue-stat-of">of {VENUES.length} visited</div>
                        </div>
                        <div className="m3-card m3-card-elevated venue-stat-summary">
                            <div className="venue-stat-number">🏀 {stats.nba}</div>
                            <div className="venue-stat-of">NBA Arenas</div>
                        </div>
                        <div className="m3-card m3-card-elevated venue-stat-summary">
                            <div className="venue-stat-number">⚾ {stats.mlb}</div>
                            <div className="venue-stat-of">MLB Stadiums</div>
                        </div>
                        <div className="m3-card m3-card-elevated venue-stat-summary">
                            <div className="venue-stat-number">🏈 {stats.nfl}</div>
                            <div className="venue-stat-of">NFL Stadiums</div>
                        </div>
                    </div>

                    <div className="search-container">
                        <span className="search-icon">🔍</span>
                        <input
                            type="text"
                            className="m3-text-field search-input"
                            placeholder="Search venues by name, city, or state..."
                            value={searchQuery}
                            onChange={e => setSearchQuery(e.target.value)}
                        />
                    </div>

                    <div className="timeline-filters" style={{ marginBottom: 'var(--spacing-xl)' }}>
                        {['all', 'NBA', 'MLB', 'NFL'].map(league => (
                            <button
                                key={league}
                                className={`m3-chip ${filterLeague === league ? 'selected' : ''}`}
                                onClick={() => setFilterLeague(league)}
                            >
                                {league === 'all' ? 'All Leagues' : league}
                                {league !== 'all' && ` (${VENUES.filter(v => v.league === league).length})`}
                            </button>
                        ))}
                    </div>

                    <div className="venue-explorer-container">
                        <div className="venue-map-container">
                            <div className="m3-card m3-card-elevated venue-map">
                                <div ref={mapRef} style={{ width: '100%', height: '100%', borderRadius: 'var(--shape-corner-large)' }}></div>
                            </div>
                        </div>

                        <div className="venue-list-container">
                            {filteredVenues.length > 0 ? (
                                filteredVenues.map((venue, index) => {
                                    const isVisited = visitedVenues.has(venue.name);
                                    const gamesAtVenue = games.filter(g => g.venue === venue.name);
                                    
                                    return (
                                        <div 
                                            key={venue.id} 
                                            id={`venue-${venue.id}`}
                                            className={`m3-card venue-card ${isVisited ? 'visited' : ''}`}
                                            style={{ animationDelay: `${index * 0.02}s` }}
                                            onClick={() => {
                                                if (leafletMapRef.current && markersRef.current[index]) {
                                                    leafletMapRef.current.setView([venue.lat, venue.lng], 10);
                                                    markersRef.current[index].openPopup();
                                                }
                                            }}
                                        >
                                            <div className="venue-icon">
                                                {venue.league === 'NBA' && '🏀'}
                                                {venue.league === 'MLB' && '⚾'}
                                                {venue.league === 'NFL' && '🏈'}
                                            </div>

                                            <div className="venue-main-info">
                                                <div className="venue-name-location">
                                                    <div className="venue-name">{venue.name}</div>
                                                    <div className="venue-location">
                                                        📍 {venue.city}, {venue.state}
                                                    </div>
                                                </div>

                                                <div className={`venue-badge ${venue.league.toLowerCase()}`}>
                                                    {venue.league}
                                                </div>

                                                <div className="venue-info">
                                                    <div className="venue-info-item">
                                                        <span>👥</span>
                                                        <span>{venue.capacity.toLocaleString()}</span>
                                                    </div>
                                                    {isVisited && (
                                                        <div className="venue-info-item">
                                                            <span>🎟️</span>
                                                            <span>{gamesAtVenue.length} {gamesAtVenue.length === 1 ? 'game' : 'games'}</span>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="venue-teams" title={venue.teams.join(', ')}>
                                                    {venue.teams.join(', ')}
                                                </div>
                                            </div>

                                            {isVisited && (
                                                <div className="venue-visited-badge">
                                                    ✓ Visited
                                                </div>
                                            )}
                                        </div>
                                    );
                                })
                            ) : (
                                <div className="empty-state">
                                    <div className="empty-state-icon">🔍</div>
                                    <h3 className="empty-state-title">No venues found</h3>
                                    <p className="empty-state-subtitle">Try adjusting your search or filters</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function DailyTrivia() {
            const [triviaState, setTriviaState] = useState(() => {
                const saved = getStorageData('deepseats-trivia', {});
                const today = new Date().toDateString();
                
                // Reset if it's a new day
                if (saved.lastPlayed !== today) {
                    return {
                        lastPlayed: today,
                        currentQuestion: Math.floor(Math.random() * TRIVIA_QUESTIONS.length),
                        answered: false,
                        selectedAnswer: null,
                        streak: saved.lastPlayed === new Date(Date.now() - 86400000).toDateString() ? saved.streak : 0,
                        totalCorrect: saved.totalCorrect || 0,
                        totalAnswered: saved.totalAnswered || 0
                    };
                }
                return saved;
            });

            useEffect(() => {
                setStorageData('deepseats-trivia', triviaState);
            }, [triviaState]);

            const currentQuestion = TRIVIA_QUESTIONS[triviaState.currentQuestion];

            const handleAnswer = (index) => {
                if (triviaState.answered) return;

                const isCorrect = index === currentQuestion.correct;
                setTriviaState({
                    ...triviaState,
                    answered: true,
                    selectedAnswer: index,
                    streak: isCorrect ? triviaState.streak + 1 : 0,
                    totalCorrect: triviaState.totalCorrect + (isCorrect ? 1 : 0),
                    totalAnswered: triviaState.totalAnswered + 1
                });
            };

            const accuracy = triviaState.totalAnswered > 0 
                ? Math.round((triviaState.totalCorrect / triviaState.totalAnswered) * 100)
                : 0;

            return (
                <div className="trivia-container">
                    <div className="dashboard-header">
                        <h1 className="dashboard-title">Daily Trivia</h1>
                        <p className="dashboard-subtitle">Test your sports knowledge</p>
                    </div>

                    {triviaState.answered && (
                        <div className="trivia-stats">
                            <div className="m3-card m3-card-elevated trivia-stat-card">
                                <div className="trivia-stat-value">🔥 {triviaState.streak}</div>
                                <div className="trivia-stat-label">Day Streak</div>
                            </div>
                            <div className="m3-card m3-card-elevated trivia-stat-card">
                                <div className="trivia-stat-value">{accuracy}%</div>
                                <div className="trivia-stat-label">Accuracy</div>
                            </div>
                            <div className="m3-card m3-card-elevated trivia-stat-card">
                                <div className="trivia-stat-value">{triviaState.totalCorrect}/{triviaState.totalAnswered}</div>
                                <div className="trivia-stat-label">All Time</div>
                            </div>
                        </div>
                    )}

                    <div className="m3-card m3-card-elevated trivia-card">
                        <div className="trivia-header">
                            <span className="trivia-category">{currentQuestion.category}</span>
                            {!triviaState.answered && triviaState.streak > 0 && (
                                <div className="trivia-streak">
                                    🔥 {triviaState.streak} day streak
                                </div>
                            )}
                        </div>

                        <h2 className="trivia-question">{currentQuestion.question}</h2>

                        <div className="trivia-options">
                            {currentQuestion.options.map((option, index) => {
                                let className = 'trivia-option';
                                
                                if (triviaState.answered) {
                                    if (index === currentQuestion.correct) {
                                        className += ' correct';
                                    } else if (index === triviaState.selectedAnswer) {
                                        className += ' incorrect';
                                    } else {
                                        className += ' disabled';
                                    }
                                }

                                return (
                                    <button
                                        key={index}
                                        className={className}
                                        onClick={() => handleAnswer(index)}
                                        disabled={triviaState.answered}
                                    >
                                        {option}
                                    </button>
                                );
                            })}
                        </div>

                        {triviaState.answered && (
                            <div className={`trivia-feedback ${triviaState.selectedAnswer === currentQuestion.correct ? 'correct' : 'incorrect'}`}>
                                <strong>
                                    {triviaState.selectedAnswer === currentQuestion.correct 
                                        ? '🎉 Correct!' 
                                        : '❌ Incorrect'}
                                </strong>
                                <div className="trivia-explanation">
                                    {currentQuestion.explanation}
                                </div>
                            </div>
                        )}

                        {triviaState.answered && (
                            <div style={{ marginTop: 'var(--spacing-lg)', textAlign: 'center', color: 'var(--md-sys-color-on-surface-variant)' }}>
                                Come back tomorrow for a new question!
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function CommunityGames({ onGameClick }) {
            const [sharedGames, setSharedGames] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadSharedGames();
            }, []);

            const loadSharedGames = async () => {
                setLoading(true);
                if (!hasStorage) {
                    setLoading(false);
                    return;
                }

                try {
                    const gameKeys = await listSharedGames();
                    const games = [];
                    
                    for (const key of gameKeys) {
                        const gameData = await getSharedData(key);
                        if (gameData) {
                            games.push({ ...gameData, sharedId: key });
                        }
                    }
                    
                    // Sort by date (newest first)
                    games.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setSharedGames(games);
                } catch (error) {
                    console.error('Error loading shared games:', error);
                }
                setLoading(false);
            };

            if (loading) {
                return (

                const newPick = {
                    id: Date.now().toString(),
                    gameId,
                    pickedTeam,
                    timestamp: new Date().toISOString(),
                    status: 'pending'
                };

                if (existingPickIndex >= 0) {
                    const updatedPicks = [...picks];
                    updatedPicks[existingPickIndex] = { ...updatedPicks[existingPickIndex], ...newPick };
