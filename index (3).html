<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Deep Seats - Your Personal Sports Journey Tracker. Track games, explore venues, and build your sports story across NBA, MLB, and NFL.">
    <meta name="keywords" content="sports tracker, NBA, MLB, NFL, game logging, venue explorer, sports calendar">
    <meta name="author" content="Deep Seats">
    
    <title>Deep Seats - Your Sports Journey</title>
    
    <!-- React 18 - UI Framework -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone - JSX Transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Leaflet.js - Interactive Maps -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Google Fonts - Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ================================
           DEEP SEATS - SPORTS JOURNEY TRACKER
           Version: 1.0.0
           Design System: Material 3
           ================================ */

        /* === RESET === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* === DESIGN TOKENS === */
        :root {
            /* Color System - Material 3 Dynamic Color */
            /* Primary: Professional Blue */
            --md-sys-color-primary: #1a5fb4;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d5e3ff;
            --md-sys-color-on-primary-container: #001b3d;
            
            /* Secondary: Slate Blue-Gray */
            --md-sys-color-secondary: #535f70;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #d7e3f7;
            --md-sys-color-on-secondary-container: #10192a;
            
            /* Tertiary: Purple */
            --md-sys-color-tertiary: #6b5778;
            --md-sys-color-on-tertiary: #ffffff;
            --md-sys-color-tertiary-container: #f2daff;
            --md-sys-color-on-tertiary-container: #251431;
            
            /* Surface & Background */
            --md-sys-color-surface: #fdfbff;
            --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-surface-variant: #dfe2eb;
            --md-sys-color-on-surface-variant: #42474e;
            --md-sys-color-background: #fdfbff;
            --md-sys-color-on-background: #1a1c1e;
            
            /* Error States */
            --md-sys-color-error: #ba1a1a;
            --md-sys-color-on-error: #ffffff;
            
            /* Utility Colors */
            --md-sys-color-outline: #72777f;
            --md-sys-color-shadow: #000000;
            --md-sys-color-scrim: #000000;
            
            /* Elevation System - Material 3 Shadows */
            --md-sys-elevation-level0: none;
            --md-sys-elevation-level1: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --md-sys-elevation-level2: 0 1px 3px 1px rgba(0, 0, 0, 0.1);
            --md-sys-elevation-level3: 0 4px 8px 3px rgba(0, 0, 0, 0.12);
            --md-sys-elevation-level4: 0 6px 10px 4px rgba(0, 0, 0, 0.14);
            --md-sys-elevation-level5: 0 8px 12px 6px rgba(0, 0, 0, 0.16);
            
            /* Typography Scale - Material 3 Type System */
            --md-sys-typescale-display-large: 57px;
            --md-sys-typescale-display-medium: 45px;
            --md-sys-typescale-headline-large: 32px;
            --md-sys-typescale-headline-medium: 28px;
            --md-sys-typescale-title-large: 22px;
            --md-sys-typescale-title-medium: 16px;
            --md-sys-typescale-body-large: 16px;
            --md-sys-typescale-body-medium: 14px;
            --md-sys-typescale-label-large: 14px;
            --md-sys-typescale-label-medium: 12px;
            
            /* Spacing System - 8px Base Grid */
            --spacing-xs: 4px;   /* 0.5 units */
            --spacing-sm: 8px;   /* 1 unit */
            --spacing-md: 16px;  /* 2 units */
            --spacing-lg: 24px;  /* 3 units */
            --spacing-xl: 32px;  /* 4 units */
            --spacing-2xl: 48px; /* 6 units */
            --spacing-3xl: 64px; /* 8 units */
            
            /* Shape System - Border Radius */
            --shape-corner-none: 0px;
            --shape-corner-small: 8px;
            --shape-corner-medium: 12px;
            --shape-corner-large: 16px;
            --shape-corner-extra-large: 28px;
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        #root {
            min-height: 100vh;
        }

        /* Material 3 Components */
        .m3-card {
            background: var(--md-sys-color-surface);
            border-radius: var(--shape-corner-medium);
            box-shadow: var(--md-sys-elevation-level1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }

        .m3-card:hover {
            box-shadow: var(--md-sys-elevation-level2);
            transform: translateY(-2px);
        }

        .m3-card-elevated {
            box-shadow: var(--md-sys-elevation-level2);
        }

        .m3-card-elevated:hover {
            box-shadow: var(--md-sys-elevation-level3);
        }

        .m3-button {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: var(--md-sys-typescale-label-large);
            padding: 10px 24px;
            border-radius: var(--shape-corner-large);
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            position: relative;
            overflow: hidden;
        }

        .m3-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .m3-button:active::before {
            width: 300px;
            height: 300px;
        }

        .m3-button-filled {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }

        .m3-button-filled:hover {
            box-shadow: var(--md-sys-elevation-level1);
            transform: translateY(-1px);
        }

        .m3-button-outlined {
            background: transparent;
            color: var(--md-sys-color-primary);
            border: 1px solid var(--md-sys-color-outline);
        }

        .m3-button-text {
            background: transparent;
            color: var(--md-sys-color-primary);
            padding: 10px 12px;
        }

        .m3-fab {
            width: 56px;
            height: 56px;
            border-radius: var(--shape-corner-large);
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border: none;
            cursor: pointer;
            box-shadow: var(--md-sys-elevation-level3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            bottom: var(--spacing-lg);
            right: var(--spacing-lg);
            z-index: 1000;
            font-size: 24px;
        }

        .m3-fab:hover {
            box-shadow: var(--md-sys-elevation-level4);
            transform: scale(1.05);
        }

        .m3-chip {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 6px 12px;
            border-radius: var(--shape-corner-small);
            background: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            font-size: var(--md-sys-typescale-label-medium);
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .m3-chip:hover {
            box-shadow: var(--md-sys-elevation-level1);
        }

        .m3-chip.selected {
            background: var(--md-sys-color-secondary);
            color: var(--md-sys-color-on-secondary);
        }

        .m3-text-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--shape-corner-small);
            background: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: 'Manrope', sans-serif;
            font-size: var(--md-sys-typescale-body-large);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .m3-text-field:focus {
            outline: none;
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 1px var(--md-sys-color-primary);
        }

        /* Layout Components */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .app-header {
            position: fixed;
            top: 0;
            left: 80px;
            right: 0;
            height: 64px;
            background: var(--md-sys-color-surface);
            border-bottom: 1px solid var(--md-sys-color-outline);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-2xl);
            z-index: 90;
            box-shadow: var(--md-sys-elevation-level1);
        }

        .app-logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            font-family: 'Montserrat', sans-serif;
            font-size: var(--md-sys-typescale-headline-small);
            font-weight: 800;
            color: var(--md-sys-color-primary);
        }

        .profile-button {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-xs) var(--spacing-md);
            background: var(--md-sys-color-primary-container);
            border: none;
            border-radius: var(--shape-corner-full);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Manrope', sans-serif;
            font-size: var(--md-sys-typescale-body-medium);
            font-weight: 600;
            color: var(--md-sys-color-on-primary-container);
        }

        .profile-button:hover {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            transform: scale(1.05);
            box-shadow: var(--md-sys-elevation-level2);
        }

        .profile-button-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .profile-button-name {
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-rail {
            width: 80px;
            background: var(--md-sys-color-surface);
            border-right: 1px solid var(--md-sys-color-outline);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--spacing-lg) 0;
            gap: var(--spacing-md);
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .nav-rail-item {
            width: 56px;
            height: 56px;
            border-radius: var(--shape-corner-large);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 24px;
            color: var(--md-sys-color-on-surface-variant);
            position: relative;
            background: transparent;
            border: none;
        }

        .nav-rail-item:hover {
            background: var(--md-sys-color-secondary-container);
        }

        .nav-rail-item.active {
            background: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }

        .nav-rail-item.active::before {
            content: '';
            position: absolute;
            left: -4px;
            width: 4px;
            height: 32px;
            background: var(--md-sys-color-primary);
            border-radius: 0 4px 4px 0;
        }

        .main-content {
            flex: 1;
            margin-left: 80px;
            padding: calc(64px + var(--spacing-xl)) var(--spacing-xl) var(--spacing-xl);
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        /* Dashboard */
        .dashboard-header {
            margin-bottom: var(--spacing-2xl);
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dashboard-title {
            font-family: 'Montserrat', sans-serif;
            font-size: var(--md-sys-typescale-display-medium);
            font-weight: 800;
            color: var(--md-sys-color-on-background);
            margin-bottom: var(--spacing-sm);
            letter-spacing: -0.02em;
        }

        .dashboard-subtitle {
            font-size: var(--md-sys-typescale-title-large);
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 400;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-2xl);
        }

        .stat-card {
            padding: var(--spacing-xl);
            background: linear-gradient(135deg, var(--md-sys-color-primary) 0%, var(--md-sys-color-tertiary) 100%);
            color: white;
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }

        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.2s; }
        .stat-card:nth-child(4) { animation-delay: 0.3s; }

        .stat-label {
            font-size: var(--md-sys-typescale-label-large);
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--spacing-sm);
        }

        .stat-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 48px;
            font-weight: 800;
            line-height: 1;
        }

        /* Timeline */
        .timeline-container {
            position: relative;
        }

        .timeline-filters {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-xl);
            flex-wrap: wrap;
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .timeline {
            position: relative;
            padding-left: var(--spacing-xl);
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--md-sys-color-outline);
        }

        .timeline-item {
            margin-bottom: var(--spacing-xl);
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -7px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--md-sys-color-primary);
            box-shadow: 0 0 0 4px var(--md-sys-color-background);
        }

        .game-card {
            padding: var(--spacing-lg);
            cursor: pointer;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--spacing-md);
        }

        .game-teams {
            flex: 1;
        }

        .team-matchup {
            font-family: 'Montserrat', sans-serif;
            font-size: var(--md-sys-typescale-title-large);
            font-weight: 700;
            margin-bottom: var(--spacing-xs);
        }

        .game-meta {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            color: var(--md-sys-color-on-surface-variant);
            font-size: var(--md-sys-typescale-body-medium);
        }

        .game-score {
            font-family: 'Montserrat', sans-serif;
            font-size: 36px;
            font-weight: 800;
            text-align: right;
            color: var(--md-sys-color-primary);
        }

        /* Trophy Room */
        .trophy-showcase {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: var(--spacing-2xl);
            border-radius: var(--shape-corner-extra-large);
            margin-bottom: var(--spacing-2xl);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .trophy-showcase::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            animation: shimmer 8s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20%, -20%); }
        }

        .showcase-title {
            font-family: 'Montserrat', sans-serif;
            font-size: var(--md-sys-typescale-headline-large);
            font-weight: 800;
            margin-bottom: var(--spacing-lg);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .showcase-carousel {
            display: flex;
            gap: var(--spacing-lg);
            overflow-x: auto;
            padding-bottom: var(--spacing-md);
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.3) transparent;
        }

        .showcase-trophy {
            min-width: 200px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: var(--shape-corner-large);
            padding: var(--spacing-lg);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .trophy-icon {
            font-size: 64px;
            margin-bottom: var(--spacing-sm);
            display: block;
        }

        .trophy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--spacing-lg);
        }

        .trophy-card {
            padding: var(--spacing-lg);
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .trophy-card.locked {
            opacity: 0.5;
            filter: grayscale(1);
        }

        .trophy-card:not(.locked):hover {
            transform: scale(1.05) translateY(-4px);
        }

        .trophy-card.unlocked::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--shape-corner-medium);
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ffd700);
            z-index: -1;
            opacity: 0.5;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .trophy-name {
            font-weight: 600;
            margin-top: var(--spacing-sm);
        }

        .trophy-progress {
            font-size: var(--md-sys-typescale-body-small);
            color: var(--md-sys-color-on-surface-variant);
            margin-top: var(--spacing-xs);
        }

        /* Modal/Dialog */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease-out;
        }

        .modal {
            background: var(--md-sys-color-surface);
            border-radius: var(--shape-corner-extra-large);
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-header {
            padding: var(--spacing-xl);
            border-bottom: 1px solid var(--md-sys-color-outline);
        }

        .modal-title {
            font-family: 'Montserrat', sans-serif;
            font-size: var(--md-sys-typescale-headline-medium);
            font-weight: 700;
        }

        .modal-content {
            padding: var(--spacing-xl);
        }

        .modal-actions {
            padding: var(--spacing-xl);
            border-top: 1px solid var(--md-sys-color-outline);
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            font-size: var(--md-sys-typescale-label-large);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--md-sys-color-on-surface);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }

        /* Player & Team Tracker */
        .list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-lg);
        }

        .list-item-card {
            padding: var(--spacing-lg);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .list-item-info {
            flex: 1;
        }

        .list-item-title {
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
        }

        .list-item-subtitle {
            font-size: var(--md-sys-typescale-body-small);
            color: var(--md-sys-color-on-surface-variant);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-rail {
                display: none;
            }
            
            .app-header {
                left: 0;
                padding: 0 var(--spacing-md);
            }
            
            .app-logo {
                font-size: var(--md-sys-typescale-title-medium);
            }
            
            .profile-button-name {
                display: none;
            }
            
            .main-content {
                margin-left: 0;
                padding: calc(64px + var(--spacing-lg)) var(--spacing-lg) var(--spacing-lg);
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Snackbar */
        .snackbar {
            position: fixed;
            bottom: var(--spacing-lg);
            left: 50%;
            transform: translateX(-50%);
            background: var(--md-sys-color-on-surface);
            color: var(--md-sys-color-surface);
            padding: 12px 24px;
            border-radius: var(--shape-corner-small);
            box-shadow: var(--md-sys-elevation-level3);
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3000;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 100%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* Search */
        .search-container {
            margin-bottom: var(--spacing-lg);
            position: relative;
        }

        .search-input {
            padding-left: 48px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--md-sys-color-on-surface-variant);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--spacing-3xl) var(--spacing-lg);
        }

        .empty-state-icon {
            font-size: 64px;
            opacity: 0.3;
            margin-bottom: var(--spacing-lg);
        }

        .empty-state-title {
            font-size: var(--md-sys-typescale-headline-medium);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }

        .empty-state-subtitle {
            color: var(--md-sys-color-on-surface-variant);
        }

        /* Game Page Specific Styles */
        .game-page-header {
            background: linear-gradient(135deg, var(--md-sys-color-primary) 0%, var(--md-sys-color-tertiary) 100%);
            color: white;
            padding: var(--spacing-2xl);
            border-radius: var(--shape-corner-large);
            margin-bottom: var(--spacing-xl);
            position: relative;
            overflow: hidden;
        }

        .game-page-header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .game-matchup {
            font-family: 'Montserrat', sans-serif;
            font-size: var(--md-sys-typescale-display-medium);
            font-weight: 800;
            margin-bottom: var(--spacing-md);
            text-align: center;
            position: relative;
        }

        .game-final-score {
            font-family: 'Montserrat', sans-serif;
            font-size: 72px;
            font-weight: 900;
            text-align: center;
            margin: var(--spacing-lg) 0;
            position: relative;
        }

        .game-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .game-detail-card {
            padding: var(--spacing-lg);
            text-align: center;
        }

        .game-detail-label {
            font-size: var(--md-sys-typescale-label-medium);
            color: var(--md-sys-color-on-surface-variant);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--spacing-xs);
        }

        .game-detail-value {
            font-size: var(--md-sys-typescale-title-large);
            font-weight: 600;
            color: var(--md-sys-color-on-surface);
        }

        .game-stats-row {
            display: flex;
            justify-content: center;
            gap: var(--spacing-2xl);
            margin-top: var(--spacing-lg);
            position: relative;
        }

        .game-stat {
            text-align: center;
        }

        .game-stat-value {
            font-size: var(--md-sys-typescale-headline-medium);
            font-weight: 700;
        }

        .game-stat-label {
            font-size: var(--md-sys-typescale-label-medium);
            opacity: 0.8;
            margin-top: var(--spacing-xs);
        }

        /* Comments Section */
        .comments-section {
            margin-top: var(--spacing-2xl);
        }

        .comments-header {
            font-size: var(--md-sys-typescale-headline-medium);
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
        }

        .comment-form {
            margin-bottom: var(--spacing-xl);
        }

        .comment-input {
            width: 100%;
            min-height: 80px;
            padding: var(--spacing-md);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--shape-corner-small);
            background: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: 'Manrope', sans-serif;
            font-size: var(--md-sys-typescale-body-large);
            resize: vertical;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .comment-input:focus {
            outline: none;
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 1px var(--md-sys-color-primary);
        }

        .comment-actions {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: flex-end;
            margin-top: var(--spacing-sm);
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .comment {
            padding: var(--spacing-lg);
            animation: fadeInUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
        }

        .comment-author {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .comment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .comment-author-name {
            font-weight: 600;
        }

        .comment-timestamp {
            font-size: var(--md-sys-typescale-body-small);
            color: var(--md-sys-color-on-surface-variant);
        }

        .comment-body {
            color: var(--md-sys-color-on-surface);
            line-height: 1.6;
        }

        .comment-reactions {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-sm);
        }

        .comment-reaction-btn {
            background: transparent;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--shape-corner-small);
            padding: 4px 12px;
            font-size: var(--md-sys-typescale-body-small);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--md-sys-color-on-surface-variant);
        }

        .comment-reaction-btn:hover {
            background: var(--md-sys-color-secondary-container);
            border-color: var(--md-sys-color-secondary);
        }

        .comment-reaction-btn.active {
            background: var(--md-sys-color-primary-container);
            border-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary-container);
        }

        .share-banner {
            background: var(--md-sys-color-tertiary-container);
            color: var(--md-sys-color-on-tertiary-container);
            padding: var(--spacing-md);
            border-radius: var(--shape-corner-small);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .share-url {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: var(--md-sys-typescale-body-small);
            user-select: all;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 600;
            cursor: pointer;
            margin-bottom: var(--spacing-lg);
            transition: color 0.2s;
        }

        .back-button:hover {
            color: var(--md-sys-color-primary);
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-3xl);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--md-sys-color-outline);
            border-top-color: var(--md-sys-color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Trivia Game Styles */
        .trivia-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .trivia-card {
            padding: var(--spacing-2xl);
            margin-bottom: var(--spacing-xl);
            background: linear-gradient(135deg, var(--md-sys-color-primary-container) 0%, var(--md-sys-color-tertiary-container) 100%);
        }

        .trivia-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
        }

        .trivia-streak {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: var(--shape-corner-small);
            font-weight: 600;
        }

        .trivia-question {
            font-family: 'Montserrat', sans-serif;
            font-size: var(--md-sys-typescale-headline-medium);
            font-weight: 700;
            margin-bottom: var(--spacing-xl);
            line-height: 1.3;
        }

        .trivia-category {
            display: inline-block;
            background: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            padding: 4px 12px;
            border-radius: var(--shape-corner-small);
            font-size: var(--md-sys-typescale-label-small);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--spacing-lg);
        }

        .trivia-options {
            display: grid;
            gap: var(--spacing-md);
        }

        .trivia-option {
            padding: var(--spacing-lg);
            border: 2px solid var(--md-sys-color-outline);
            border-radius: var(--shape-corner-medium);
            background: var(--md-sys-color-surface);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: var(--md-sys-typescale-body-large);
            text-align: left;
            position: relative;
        }

        .trivia-option:hover:not(.correct):not(.incorrect):not(.disabled) {
            border-color: var(--md-sys-color-primary);
            transform: translateX(4px);
        }

        .trivia-option.selected {
            border-color: var(--md-sys-color-primary);
            background: var(--md-sys-color-primary-container);
        }

        .trivia-option.correct {
            border-color: #2e7d32;
            background: #c8e6c9;
            color: #1b5e20;
            animation: correctPulse 0.5s ease-out;
        }

        .trivia-option.incorrect {
            border-color: #c62828;
            background: #ffcdd2;
            color: #b71c1c;
            animation: shake 0.5s ease-out;
        }

        .trivia-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .trivia-feedback {
            margin-top: var(--spacing-xl);
            padding: var(--spacing-lg);
            border-radius: var(--shape-corner-medium);
            animation: fadeInUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .trivia-feedback.correct {
            background: #c8e6c9;
            color: #1b5e20;
        }

        .trivia-feedback.incorrect {
            background: #ffcdd2;
            color: #b71c1c;
        }

        .trivia-explanation {
            margin-top: var(--spacing-sm);
            font-size: var(--md-sys-typescale-body-medium);
            line-height: 1.6;
        }

        .trivia-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-xl);
        }

        .trivia-stat-card {
            padding: var(--spacing-lg);
            text-align: center;
        }

        .trivia-stat-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: var(--md-sys-color-primary);
        }

        .trivia-stat-label {
            font-size: var(--md-sys-typescale-label-medium);
            color: var(--md-sys-color-on-surface-variant);
            margin-top: var(--spacing-xs);
        }

        /* Picks/Predictions Styles */
        .picks-grid {
            display: grid;
            gap: var(--spacing-lg);
        }

        /* Venue Map Styles */
        .venue-explorer-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xl);
            margin-top: var(--spacing-xl);
        }

        .venue-map-container {
            position: sticky;
            top: var(--spacing-xl);
            height: fit-content;
        }

        .venue-map {
            width: 100%;
            height: 600px;
            background: var(--md-sys-color-surface-variant);
            border-radius: var(--shape-corner-large);
            position: relative;
            overflow: hidden;
        }

        .leaflet-container {
            width: 100%;
            height: 100%;
            border-radius: var(--shape-corner-large);
            z-index: 1;
        }

        .leaflet-popup-content-wrapper {
            border-radius: var(--shape-corner-small);
            font-family: 'Manrope', sans-serif;
        }

        .leaflet-popup-content {
            margin: var(--spacing-sm);
        }

        .custom-marker {
            width: 40px;
            height: 40px;
            background: var(--md-sys-color-primary);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .custom-marker:hover {
            transform: scale(1.2);
        }

        .custom-marker.nba {
            background: #ff6f00;
        }

        .custom-marker.mlb {
            background: #1565c0;
        }

        .custom-marker.nfl {
            background: #c62828;
        }

        .custom-marker.visited {
            border-width: 4px;
            border-color: #ffd700;
            box-shadow: 0 2px 12px rgba(255, 215, 0, 0.5);
        }

        .venue-popup {
            min-width: 200px;
        }

        .venue-popup-title {
            font-weight: 700;
            font-size: var(--md-sys-typescale-title-medium);
            margin-bottom: var(--spacing-xs);
            color: var(--md-sys-color-on-surface);
        }

        .venue-popup-location {
            color: var(--md-sys-color-on-surface-variant);
            font-size: var(--md-sys-typescale-body-small);
            margin-bottom: var(--spacing-xs);
        }

        .venue-popup-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: var(--md-sys-typescale-label-small);
            font-weight: 600;
            margin-top: var(--spacing-xs);
        }

        .venue-popup-badge.nba {
            background: #fff3e0;
            color: #e65100;
        }

        .venue-popup-badge.mlb {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .venue-popup-badge.nfl {
            background: #ffebee;
            color: #b71c1c;
        }

        .venue-popup-visited {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: var(--md-sys-typescale-label-small);
            font-weight: 600;
            margin-top: var(--spacing-xs);
            display: inline-block;
        }

        .map-canvas {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            position: relative;
        }

        .usa-map-svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 95%;
            opacity: 0.15;
            pointer-events: none;
        }

        .usa-state {
            fill: var(--md-sys-color-on-surface);
            stroke: white;
            stroke-width: 1.5;
            transition: fill 0.2s;
        }

        .venue-marker {
            position: absolute;
            width: 32px;
            height: 32px;
            background: var(--md-sys-color-primary);
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: var(--md-sys-elevation-level2);
            z-index: 1;
        }

        .venue-marker:hover {
            transform: scale(1.3);
            z-index: 2;
            box-shadow: var(--md-sys-elevation-level4);
        }

        .venue-marker.visited {
            background: #2e7d32;
        }

        .venue-marker.nba {
            background: #ff6f00;
        }

        .venue-marker.mlb {
            background: #1565c0;
        }

        .venue-marker.nfl {
            background: #c62828;
        }

        .venue-marker.visited.nba {
            background: #ff8f00;
            border-color: #ffd54f;
        }

        .venue-marker.visited.mlb {
            background: #1976d2;
            border-color: #64b5f6;
        }

        .venue-marker.visited.nfl {
            background: #d32f2f;
            border-color: #ef5350;
        }

        .venue-tooltip {
            position: absolute;
            background: var(--md-sys-color-surface);
            padding: var(--spacing-sm);
            border-radius: var(--shape-corner-small);
            box-shadow: var(--md-sys-elevation-level3);
            pointer-events: none;
            white-space: nowrap;
            font-size: var(--md-sys-typescale-body-small);
            font-weight: 600;
            z-index: 10;
        }

        .map-legend {
            position: absolute;
            bottom: var(--spacing-md);
            right: var(--spacing-md);
            background: rgba(255, 255, 255, 0.95);
            padding: var(--spacing-md);
            border-radius: var(--shape-corner-small);
            box-shadow: var(--md-sys-elevation-level2);
        }

        .map-legend-title {
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
            font-size: var(--md-sys-typescale-label-large);
        }

        .map-legend-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-xs);
            font-size: var(--md-sys-typescale-body-small);
        }

        .map-legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .venue-list-container {
            max-height: 800px;
            overflow-y: auto;
            padding-right: var(--spacing-sm);
        }

        .venue-card {
            padding: var(--spacing-md) var(--spacing-lg);
            margin-bottom: var(--spacing-sm);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            min-height: auto;
        }

        .venue-card:hover {
            border-left-color: var(--md-sys-color-primary);
            transform: translateX(4px);
        }

        .venue-card.visited {
            background: var(--md-sys-color-primary-container);
            border-left-color: var(--md-sys-color-primary);
        }

        .venue-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            flex: 1;
            min-width: 0;
        }

        .venue-icon {
            font-size: 28px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--md-sys-color-surface-variant);
            border-radius: var(--shape-corner-small);
            flex-shrink: 0;
        }

        .venue-main-info {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .venue-name-location {
            min-width: 250px;
            flex-shrink: 0;
        }

        .venue-name {
            font-weight: 700;
            font-size: var(--md-sys-typescale-body-large);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .venue-location {
            color: var(--md-sys-color-on-surface-variant);
            font-size: var(--md-sys-typescale-body-small);
            white-space: nowrap;
        }

        .venue-meta {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
            flex-shrink: 0;
        }

        .venue-badge {
            padding: 4px 10px;
            border-radius: var(--shape-corner-small);
            font-size: var(--md-sys-typescale-label-small);
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .venue-badge.nba {
            background: #fff3e0;
            color: #e65100;
        }

        .venue-badge.mlb {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .venue-badge.nfl {
            background: #ffebee;
            color: #b71c1c;
        }

        .venue-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            font-size: var(--md-sys-typescale-body-small);

        .team-stat-value {

        .profile-stat-value {

        /**

         * @param {string} key - Storage key
         * @param {*} defaultValue - Default value if key doesn't exist
         * @returns {*} Parsed data or default value

        const getStorageData = (key, defaultValue = []) => {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultValue;
            } catch {
                return defaultValue;
            }
        };

        const setStorageData = (key, value) => {
            localStorage.setItem(key, JSON.stringify(value));
        };

                return result ? JSON.parse(result.value) : null;

                console.log('Key not found:', key);
